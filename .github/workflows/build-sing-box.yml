name: Build sing-box with v2ray api

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  check-build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest sing-box release
        id: latest
        run: |
          latest_tag=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Check current release in this repo
        id: current
        run: |
          current_tag=$(curl -fsSL https://api.github.com/repos/${{ github.repository }}/releases/latest 2>/dev/null | jq -r .tag_name || true)
          echo "tag=$current_tag" >> "$GITHUB_OUTPUT"

      - name: Skip if already latest
        if: steps.latest.outputs.tag == steps.current.outputs.tag
        run: |
          echo "Already latest: ${{ steps.latest.outputs.tag }}"
          exit 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ steps.latest.outputs.tag }}
          path: sing-box-src

      - name: Prepare build tags
        id: tags
        run: |
          cd sing-box-src
          default_tags=$(tr '\n' ',' < release/DEFAULT_BUILD_TAGS | sed 's/,$//')
          # 移除会导致 Linux 编译报错的 naive tag，再加上 with_v2ray_api
          final_tags=$(printf '%s\n' "$default_tags" | tr ',' '\n' | grep -v '^with_naive_outbound$' | awk 'NF && !seen[$0]++' | paste -sd',' -)
          final_tags="${final_tags},with_v2ray_api"
          echo "tags=$final_tags" >> "$GITHUB_OUTPUT"

      - name: Read ldflags
        id: ldflags
        run: |
          cd sing-box-src
          ldflags=$(tr '\n' ' ' < release/LDFLAGS | sed 's/  */ /g')
          echo "ldflags=$ldflags" >> "$GITHUB_OUTPUT"

      - name: Build linux amd64
        run: |
          cd sing-box-src
          mkdir -p ../dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags "${{ steps.ldflags.outputs.ldflags }}" -tags "${{ steps.tags.outputs.tags }}" \
          -o ../dist/sing-box-linux-amd64 ./cmd/sing-box

      - name: Verify build tags
        run: |
          chmod +x dist/sing-box-linux-amd64
          ./dist/sing-box-linux-amd64 version
          ./dist/sing-box-linux-amd64 version | grep with_v2ray_api

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.latest.outputs.tag }}
          name: ${{ steps.latest.outputs.tag }}
          files: |
            dist/sing-box-linux-amd64
